document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8b2778c7-57a5-42ad-86b2-c96e5f7a86bb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg1: #160f28;\n    --bg2: #0c0918;\n    --bloom-op: 0.55;\n    --line-op: 0.26;\n    --accent: #36e4c6;\n    --ink: #eaf2ff;\n    --muted: #8b8aa8;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; height: 100%;\n    background: var(--bg2);\n    font-family: 'Space Grotesk', system-ui, sans-serif;\n    color: var(--ink);\n    overflow: hidden;\n  }\n  #stage {\n    position: fixed; inset: 0;\n    background:\n      radial-gradient(120% 95% at 50% 42%, var(--bg1) 0%, var(--bg2) 68%),\n      var(--bg2);\n    transition: background .6s ease;\n  }\n  /* glow bakom hjärnan */\n  #stage::before {\n    content: ''; position: absolute;\n    left: 50%; top: 44%; transform: translate(-50%, -50%);\n    width: 60vmin; height: 56vmin;\n    background: radial-gradient(closest-side, color-mix(in srgb, var(--accent) 16%, transparent), transparent 72%);\n    filter: blur(18px); opacity: .55; pointer-events: none;\n    transition: background .6s ease;\n  }\n\n  svg#brain {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    display: block;\n  }\n\n  /* ---- bloom-lager ---- */\n  #bloomLayer {\n    filter: blur(6px);\n    opacity: var(--bloom-op);\n    pointer-events: none;\n    animation: breathe 7s ease-in-out infinite;\n    transition: opacity .6s ease;\n  }\n  #bloomLayer line { stroke-width: 2.4; }\n  #bloomLayer line.rim { stroke-width: 6.5; }\n  @keyframes breathe {\n    0%, 100% { opacity: calc(var(--bloom-op) * 0.78); }\n    50%      { opacity: var(--bloom-op); }\n  }\n\n  /* ---- kanter ---- */\n  .edge {\n    stroke-width: 1.1;\n    opacity: var(--line-op);\n    transition: opacity .35s ease, stroke-width .35s ease;\n  }\n  .edge.is-lit {\n    opacity: .95;\n    stroke-width: 1.8;\n  }\n  .edge.rim {\n    stroke-width: 5;\n    opacity: 0.92;\n  }\n  .edge.rim.is-lit { stroke-width: 5.6; }\n\n  /* ---- noder ---- */\n  .node {\n    cursor: pointer;\n    transform-box: fill-box;\n    transform-origin: center;\n    animation: tw 6.5s ease-in-out infinite;\n    transition: opacity .35s ease, r .25s ease;\n  }\n  .node.medial { animation-duration: 9s; }\n  @keyframes tw {\n    0%, 100% { transform: scale(0.9);  opacity: .72; }\n    50%      { transform: scale(1.08); opacity: 1; }\n  }\n  .node:hover { animation-play-state: paused; }\n\n  /* hover-tillstånd */\n  .hovering .node:not(.is-hover):not(.is-neighbor) { opacity: .32; }\n  .hovering .edge:not(.is-lit) { opacity: calc(var(--line-op) * 0.5); }\n  .node.is-hover, .node.is-neighbor { animation-play-state: paused; opacity: 1; }\n  .node.is-hover { transform: scale(1.55); filter: drop-shadow(0 0 6px var(--accent)); }\n\n  /* vald-tillstånd */\n  .has-selection .node:not(.is-selected):not(.is-neighbor) { opacity: .14; }\n  .has-selection .edge:not(.is-lit) { opacity: calc(var(--line-op) * 0.32); }\n  .has-selection #bloomLayer { opacity: calc(var(--bloom-op) * 0.6); }\n  .node.is-neighbor { animation-play-state: paused; opacity: 1; transform: scale(1.2); }\n  .node.is-selected {\n    animation-play-state: paused; opacity: 1;\n    transform: scale(1.9);\n    filter: drop-shadow(0 0 9px var(--accent));\n  }\n\n  /* ---- header ---- */\n  .head {\n    position: fixed; left: 34px; top: 30px; z-index: 5;\n    pointer-events: none; user-select: none;\n  }\n  .kicker {\n    font-family: 'IBM Plex Mono', monospace;\n    font-size: 11px; letter-spacing: .32em;\n    color: var(--accent); opacity: .85; margin: 0 0 8px;\n  }\n  .head .logo {\n    display: block;\n    width: 260px;\n    height: auto;\n  }\n  /* mörka teman: gör den svarta logotypen ljus */\n  body:not(.light) .head .logo {\n    filter: invert(1) brightness(1.6);\n  }\n\n  /* ---- meny i headern (höger) ---- */\n  .topnav {\n    position: fixed; top: 30px; right: 34px; z-index: 6;\n    display: flex; gap: 4px; padding: 5px;\n    background: color-mix(in srgb, var(--bg1) 70%, #000);\n    border: 1px solid rgba(255,255,255,.08);\n    border-radius: 999px;\n    backdrop-filter: blur(12px);\n    box-shadow: 0 8px 30px rgba(0,0,0,.45);\n  }\n  .navlink {\n    cursor: pointer; text-decoration: none;\n    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500;\n    color: var(--muted); background: transparent;\n    padding: 8px 18px; border-radius: 999px;\n    transition: color .25s ease, background .25s ease;\n  }\n  .navlink:hover {\n    color: #06121a;\n    background: var(--accent);\n    box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 50%, transparent);\n  }\n\n  /* ---- temaväxlare ---- */\n  .switch {\n    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);\n    z-index: 6; display: flex; gap: 4px; padding: 5px;\n    background: color-mix(in srgb, var(--bg1) 70%, #000);\n    border: 1px solid rgba(255,255,255,.08);\n    border-radius: 999px;\n    backdrop-filter: blur(12px);\n    box-shadow: 0 8px 30px rgba(0,0,0,.45);\n  }\n  .seg {\n    appearance: none; border: 0; cursor: pointer;\n    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500;\n    color: var(--muted); background: transparent;\n    padding: 8px 18px; border-radius: 999px;\n    transition: color .25s ease, background .25s ease;\n  }\n  .seg:hover { color: var(--ink); }\n  .seg.active {\n    color: #06121a;\n    background: var(--accent);\n    box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 50%, transparent);\n  }\n\n  /* ---- infopanel ---- */\n  #panel {\n    position: fixed; top: 0; right: 0; height: 100%;\n    width: 372px; max-width: 88vw; z-index: 8;\n    background: color-mix(in srgb, var(--bg1) 82%, #000);\n    border-left: 1px solid rgba(255,255,255,.08);\n    backdrop-filter: blur(20px);\n    box-shadow: -24px 0 60px rgba(0,0,0,.5);\n    transform: translateX(105%);\n    transition: transform .42s cubic-bezier(.22,.61,.36,1);\n    display: flex; flex-direction: column;\n    padding: 34px 32px;\n  }\n  #panel.open { transform: translateX(0); }\n\n  #panel-close {\n    position: absolute; top: 24px; right: 24px;\n    width: 34px; height: 34px; border-radius: 50%;\n    border: 1px solid rgba(255,255,255,.12); background: transparent;\n    color: var(--muted); cursor: pointer; font-size: 16px;\n    display: grid; place-items: center; transition: .2s;\n  }\n  #panel-close:hover { color: var(--ink); border-color: rgba(255,255,255,.3); }\n\n  .p-top { display: flex; align-items: center; gap: 14px; }\n  #p-swatch {\n    width: 40px; height: 40px; border-radius: 12px; flex: none;\n    box-shadow: 0 0 22px -2px currentColor;\n    border: 1px solid rgba(255,255,255,.18);\n  }\n  #p-code {\n    font-family: 'IBM Plex Mono', monospace; font-size: 12px;\n    letter-spacing: .22em; color: var(--accent);\n  }\n  #p-region { margin: 2px 0 0; font-size: 21px; font-weight: 600; }\n\n  .meta-row { display: flex; gap: 10px; margin: 22px 0 4px; flex-wrap: wrap; }\n  .meta-pill {\n    font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;\n    padding: 6px 12px; border-radius: 999px;\n    border: 1px solid rgba(255,255,255,.12);\n    color: var(--ink); background: rgba(255,255,255,.03);\n  }\n  .meta-pill.left  { border-color: color-mix(in srgb, #28d7b8 50%, transparent); }\n  .meta-pill.right { border-color: color-mix(in srgb, #3f6dff 50%, transparent); }\n  .meta-pill .n { color: var(--accent); }\n\n  .p-label {\n    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;\n    letter-spacing: .26em; color: var(--muted);\n    margin: 30px 0 12px; text-transform: uppercase;\n  }\n  .placeholder {\n    font-size: 13.5px; line-height: 1.6; color: var(--muted);\n    border-left: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);\n    padding-left: 14px;\n  }\n\n  #p-links { list-style: none; margin: 0; padding: 0;\n    display: flex; flex-direction: column; gap: 2px;\n    overflow-y: auto; }\n  #p-links li {\n    display: flex; align-items: center; gap: 11px;\n    padding: 10px 12px; border-radius: 10px; cursor: pointer;\n    transition: background .18s ease;\n  }\n  #p-links li:hover { background: rgba(255,255,255,.05); }\n  #p-links .dot { width: 9px; height: 9px; border-radius: 50%; flex: none;\n    box-shadow: 0 0 8px -1px currentColor; }\n  #p-links .lk-code { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; }\n  #p-links .lk-side { margin-left: auto; font-size: 11.5px; color: var(--muted); }\n\n  /* ---- ljust l\\u00e4ge (Salvia) ---- */\n  body.light {\n    --ink: #2b322a;\n    --muted: #6e786c;\n  }\n  body.light #stage::before { opacity: .4; }\n  body.light .switch {\n    background: rgba(255, 255, 255, .72);\n    border-color: rgba(0, 0, 0, .08);\n    box-shadow: 0 8px 26px rgba(40, 60, 45, .16);\n  }\n  body.light .topnav {\n    background: rgba(255, 255, 255, .72);\n    border-color: rgba(0, 0, 0, .08);\n    box-shadow: 0 8px 26px rgba(40, 60, 45, .16);\n  }\n  body.light .navlink:hover { color: #fbfdfb; }\n  body.light .seg.active { color: #fbfdfb; }\n  body.light #panel {\n    background: rgba(250, 248, 241, .94);\n    border-left: 1px solid rgba(0, 0, 0, .08);\n    box-shadow: -24px 0 60px rgba(40, 60, 45, .18);\n  }\n  body.light #panel-close { border-color: rgba(0, 0, 0, .14); }\n  body.light #panel-close:hover { border-color: rgba(0, 0, 0, .34); }\n  body.light #p-swatch { border-color: rgba(0, 0, 0, .12); }\n  body.light .meta-pill {\n    border-color: rg return function () {\n    a |= 0; a = (a + 0x6D2B79F5) | 0;\n    let t = Math.imul(a ^ (a >>> 15), 1 | a);\n    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;\n    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;\n  };\n}\nconst rand = mulberry32(20260609);\n\nconst OUTLINE = [\n  [0.05, -0.96],   // medial front (mittskåra)\n  [0.17, -0.99],   // frontalpol\n  [0.27, -0.95],\n  [0.24, -0.885],  // sulcus in\n  [0.38, -0.855],  // lob ut\n  [0.45, -0.78],\n  [0.385, -0.715], // in\n  [0.55, -0.655],  // lob ut\n  [0.625, -0.565],\n  [0.565, -0.485], // in\n  [0.725, -0.42],  // lob ut\n  [0.805, -0.30],\n  [0.755, -0.185], // in\n  [0.885, -0.07],  // bredaste lob ut\n  [0.89, 0.055],\n  [0.815, 0.155],  // in\n  [0.86, 0.275],   // lob ut\n  [0.81, 0.40],\n  [0.735, 0.475],  // nedre yttersida – buktar ut\n  [0.76, 0.575],   // bukt ut\n  [0.69, 0.665],   // bukt ut\n  [0.575, 0.745],\n  [0.46, 0.81],\n  [0.40, 0.875],   // occipitallob ut\n  [0.285, 0.905],\n  [0.175, 0.93],   // occipitalpol\n  [0.08, 0.90]     // medial back (mittskåra)\n];\nconst POLY = OUTLINE.concat([[0.03, 0.91], [0.03, -0.95]]);\n\nfunction pointInPoly(x, y, poly) {\n  let inside = false;\n  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {\n    const xi = poly[i][0], yi = poly[i][1];\n    const xj = poly[j][0], yj = poly[j][1];\n    const hit = (yi > y) !== (yj > y) &&\n      x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;\n    if (hit) inside = !inside;\n  }\n  return inside;\n}\n\nfunction buildHalf() {\n  const pts = [];\n  const minD = 0.115;\n  const tooClose = (x, y, d) => pts.some(p => Math.hypot(p.x - x, p.y - y) < d);\n  let ro = 0;\n  for (let i = 0; i < OUTLINE.length - 1; i++) {\n    const a = OUTLINE[i], b = OUTLINE[i + 1];\n    const len = Math.hypot(b[0] - a[0], b[1] - a[1]);\n    const segs = Math.max(1, Math.round(len / 0.115));\n    for (let s = 0; s < segs; s++) {\n      const t = s / segs;\n      const x = a[0] + (b[0] - a[0]) * t;\n      const y = a[1] + (b[1] - a[1]) * t;\n      if (!tooClose(x, y, minD * 0.85)) pts.push({ x, y, rim: true, medial: false, ro: ro++ });\n    }\n  }\n  for (let y = -0.86; y <= 0.86; y += 0.22) {\n    const x = 0.055;\n    if (pointInPoly(x, y, POLY)) pts.push({ x, y, rim: false, medial: true });\n  }\n  // extra medialnod nedtill -> mjukare, rundad \\u00f6verg\\u00e5ng mot bottenpunkten\n  pts.push({ x: 0.078, y: 0.805, rim: false, medial: true });\n  let row = 0;\n  for (let gy = -0.9; gy <= 0.9; gy += 0.167) {\n    const off = (row % 2) * 0.0835;\n    row++;\n    for (let gx = 0.08; gx <= 0.86; gx += 0.167) {\n      const x = gx + off + (rand() - 0.5) * 0.06;\n      const y = gy + (rand() - 0.5) * 0.06;\n      if (x < 0.085) continue;\n      if (!pointInPoly(x, y, POLY)) continue;\n      if (tooClose(x, y, minD)) continue;\n      pts.push({ x, y, rim: false, medial: false });\n    }\n  }\n  return pts;\n}\n\nfunction buildEdges(nodes) {\n  const set = new Set();\n  for (let i = 0; i < nodes.length; i++) {\n    const cand = [];\n    for (let j = 0; j < nodes.length; j++) {\n      if (i === j) continue;\n      // inga tunna ackord mellan kantnoder – konturen sköts separat\n      if (nodes[i].rim && nodes[j].rim) continue;\n      const d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);\n      if (d < 0.29) cand.push([d, j]);\n    }\n    cand.sort((a, b) => a[0] - b[0]);\n    const k = Math.min(cand.length, nodes[i].rim ? 3 : 4);\n    for (let m = 0; m < k; m++) {\n      const j = cand[m][1];\n      set.add(i < j ? i + '-' + j : j + '-' + i);\n    }\n  }\n  const medial = nodes.map((n, idx) => (n.medial ? idx : -1)).filter(i => i >= 0)\n    .sort((a, b) => nodes[a].y - nodes[b].y);\n  const contour = new Set();\n  const addC = (a, b) => { set.add(a < b ? a + '-' + b : b + '-' + a); contour.add(a < b ? a + '-' + b : b + '-' + a); };\n  for (let m = 0; m < medial.length - 1; m++) {\n    addC(medial[m], medial[m + 1]);\n  }\n  // explicit kontur: koppla konsekutiva kantnoder -> sammanhängande ytterlinje\n  const rimN = nodes.map((n, idx) => (n.rim ? idx : -1)).filter(i => i >= 0)\n    .sort((a, b) => nodes[a].ro - nodes[b].ro);\n  for (let m = 0; m < rimN.length - 1; m++) {\n    addC(rimN[m], rimN[m + 1]);\n  }\n  // slut loopen: koppla yttre kantens topp/botten till mittlinjens topp/botten\n  if (rimN.length && medial.length) {\n    addC(rimN[0], medial[0]);                       // topp\n    addC(rimN[rimN.length - 1], medial[medial.length - 1]); // botten\n  }\n  const edges = [...set].map(s => s.split('-').map(Number));\n\n  // --- rensa korsande sträckor (avstökning) ---\n  const key = (a, b) => Math.min(a, b) + '-' + Math.max(a, b);\n  const elen = e => Math.hypot(nodes[e[0]].x - nodes[e[1]].x, nodes[e[0]].y - nodes[e[1]].y);\n  const ccw = (a, b, c) => (c[1] - a[1]) * (b[0] - a[0]) - (b[1] - a[1]) * (c[0] - a[0]);\n  const cross = (p1, p2, p3, p4) => {\n    const d1 = ccw(p3, p4, p1), d2 = ccw(p3, p4, p2);\n    const d3 = ccw(p1, p2, p3), d4 = ccw(p1, p2, p4);\n    return ((d1 > 0) !== (d2 > 0)) && ((d3 > 0) !== (d4 > 0));\n  };\n  const P = i => [nodes[i].x, nodes[i].y];\n  const removed = new Set();\n  for (let i = 0; i < edges.length; i++) {\n    if (removed.has(i)) continue;\n    for (let j = i + 1; j < edges.length; j++) {\n      if (removed.has(j)) continue;\n      const e1 = edges[i], e2 = edges[j];\n      if (e1[0] === e2[0] || e1[0] === e2[1] || e1[1] === e2[0] || e1[1] === e2[1]) continue;\n      if (!cross(P(e1[0]), P(e1[1]), P(e2[0]), P(e2[1]))) continue;\n      const c1 = contour.has(key(e1[0], e1[1])), c2 = contour.has(key(e2[0], e2[1]));\n      let drop;\n      if (c1 && c2) continue;           // korsande konturlinjer r\\u00f6rs ej\n      else if (c1) drop = j;\n      else if (c2) drop = i;\n      else drop = elen(e1) >= elen(e2) ? i : j; // ta bort den l\\u00e4ngre\n      removed.add(drop);\n      if (drop === i) break;\n    }\n  }\n  const pruned = edges.filter((_, i) => !removed.has(i));\n  return { edges: pruned, contour };\n}\n\nfunction buildBrain() {\n  const right = buildHalf();\n  const { edges: rEdges, contour: rContour } = buildEdges(right);\n  const offset = right.length;\n  const nodes = [];\n  right.forEach((p, i) => nodes.push({ id: i, x: p.x, y: p.y, side: 'R', medial: p.medial, rim: p.rim, ro: p.ro }));\n  right.forEach((p, i) => nodes.push({ id: offset + i, x: -p.x, y: p.y, side: 'L', medial: p.medial, rim: p.rim, ro: p.ro }));\n  const edges = [];\n  const CONTOUR = new Set();\n  rEdges.forEach(([a, b]) => edges.push([a, b]));\n  rEdges.forEach(([a, b]) => edges.push([a + offset, b + offset]));\n  rContour.forEach(k => {\n    const [a, b] = k.split('-').map(Number);\n    CONTOUR.add(Math.min(a, b) + '-' + Math.max(a, b));\n    const a2 = a + offset, b2 = b + offset;\n    CONTOUR.add(Math.min(a2, b2) + '-' + Math.max(a2, b2));\n  });\n  nodes.forEach(n => { n.nb = new Set(); n.deg = 0; });\n  edges.forEach(([a, b]) => {\n    nodes[a].nb.add(b); nodes[b].nb.add(a);\n    nodes[a].deg++; nodes[b].deg++;\n  });\n  return { nodes, edges, contour: CONTOUR };\n}\n\nfunction hexToRgb(h) { const n = parseInt(h.slice(1), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }\nfunction rgbToHex([r, g, b]) { return '#' + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, '0')).join(''); }\nfunction lerpRgb(a, b, t) { return a.map((v, i) => v + (b[i] - v) * t); }\n\nconst THEMES = {\n  salvia: { name: 'Salvia', bg1: '#faf7ef', bg2: '#f5f1e8', top: '#54a596', bot: '#36726a', lBias: '#49a291', rBias: '#3a857a', biasAmt: 0.12, accent: '#3f8f81', bloom: 0.20, lineOp: 0.48, nodeR: 6.4, light: true }\n};\n\nconst VW = 1200, VH = 780, CY = 400, SX = 312, SY = 278;\nconst px = n => 600 + n.x * SX;\nconst py = n => CY + n.y * SY;\n\nconst SVGNS = 'http://www.w3.org/2000/svg';\nlet BRAIN, current = 'salvia';\nlet selected = null, hovered = null;\nconst $ = s => document.querySelector(s);\nconst svg = document.getElementById('brain');\nconst root = svg;\nlet nodeEls = [], edgeEls = [], bloomNodeEls = [], bloomEdgeEls = [];\n\nfunction nodeColor(n, th) {\n  const t = (n.y + 1) / 2;\n  let c = lerpRgb(hexToRgb(th.top), hexToRgb(th.bot), t);\n  const bias = hexToRgb(n.side === 'L' ? th.lBias : th.rBias);\n  c = lerpRgb(c, bias, th.biasAmt);\n  return rgbToHex(c);\n}\nfunction edgeColor(a, b, th) {\n  const my = ((a.y + b.y) / 2 + 1) / 2;\n  let c = lerpRgb(hexToRgb(th.top), hexToRgb(th.bot), my);\n  const side = a.side === b.side ? a.side : 'R';\n  c = lerpRgb(c, hexToRgb(side === 'L' ? th.lBias : th.rBias), th.biasAmt);\n  return rgbToHex(c);\n}\n\nfunction mk(tag, attrs) {\n  const el = document.createElementNS(SVGNS, tag);\n  for (const k in attrs) el.setAttribute(k, attrs[k]);\n  return el;\n}\n\nfunction render() {\n  BRAIN = buildBrain();\n  const { nodes, edges } = BRAIN;\n  const th = THEMES[current];\n  const bloomEdges = mk('g', { class: 'layer' });\n  const bloomNodes = mk('g', { class: 'layer' });\n  const gEdges = mk('g', { class: 'edges' });\n  const gNodes = mk('g', { class: 'nodes' });\n  edgeEls = []; bloomEdgeEls = [];\n  edges.forEach(([a, b], i) => {\n    const na = nodes[a], nb = nodes[b];\n    const isRim = BRAIN.contour.has(Math.min(a, b) + '-' + Math.max(a, b));\n    const isMedial = na.medial && nb.medial && na.side === nb.side;\n    const attrs = { x1: px(na), y1: py(na), x2: px(nb), y2: py(nb), 'data-i': i, 'data-a': a, 'data-b': b };\n    const ln = mk('line', { ...attrs, class: 'edge' + (isRim || isMedial ? ' rim' : '') });\n    gEdges.appendChild(ln); edgeEls[i] = ln;\n    const bl = mk('line', { ...attrs, class: (isRim || isMedial) ? 'rim' : '' }); bloomEdges.appendChild(bl); bloomEdgeEls[i] = bl;\n  });\n  nodeEls = []; bloomNodeEls = [];\n  nodes.forEach(n => {\n    const r = th.nodeR * (n.medial ? 0.8 : 1) * (n.deg >= 5 ? 1.45 : n.deg >= 4 ? 1.18 : 1);\n    const cx = px(n), cy = py(n);\n    const c = mk('circle', { cx, cy, r, class: 'node' + (n.medial ? ' medial' : ''), 'data-id': n.id, style: `animation-delay:${(rand() * 6).toFixed(2)}s` });\n    gNodes.appendChild(c); nodeEls[n.id] = c;\n    const b = mk('circle', { cx, cy, r: r * 1.05 }); bloomNodes.appendChild(b);\n    bloomNodeEls[n.id] = b;\n  });\n  const bloom = $('#bloomLayer');\n  bloom.innerHTML = '';\n  bloom.appendChild(bloomEdges); bloom.appendChild(bloomNodes);\n  const net = $('#net');\n  net.innerHTML = '';\n  net.appendChild(gEdges); net.appendChild(gNodes);\n  applyTheme();\n  wireNodes();\n}\n\nfunction applyTheme() {\n  const th = THEMES[current];\n  const { nodes, edges } = BRAIN;\n  const ds = document.documentElement.style;\n  ds.setProperty('--bg1', th.bg1);\n  ds.setProperty('--bg2', th.bg2);\n  ds.setProperty('--bloom-op', th.bloom);\n  ds.setProperty('--line-op', th.lineOp);\n  ds.setProperty('--accent', th.accent || th.top);\n  document.body.classList.toggle('light', !!th.light);\n  nodes.forEach(n => {\n    const col = nodeColor(n, th);\n    nodeEls[n.id].setAttribute('fill', col);\n    nodeEls[n.id].dataset.col = col;\n    bloomNodeEls[n.id].setAttribute('fill', col);\n  });\n  edges.forEach(([a, b], i) => {\n    const col = edgeColor(nodes[a], nodes[b], th);\n    edgeEls[i].setAttribute('stroke', col);\n    bloomEdgeEls[i].setAttribute('stroke', col);\n  });\n}\n\nfunction wireNodes() {\n  nodeEls.forEach((el, id) => {\n    el.addEventListener('mouseenter', () => onHover(id));\n    el.addEventListener('mouseleave', () => onHover(null));\n    el.addEventListener('click', e => { e.stopPropagation(); select(id); });\n  });\n}\n\nfunction clearMarks() {\n  document.querySelectorAll('.is-hover,.is-neighbor,.is-selected,.is-lit')\n    .forEach(e => e.classList.remove('is-hover', 'is-neighbor', 'is-selected', 'is-lit'));\n}\nfunction litEdgesFor(id) {\n  return BRAIN.edges.map((e, i) => (e[0] === id || e[1] === id ? i : -1)).filter(i => i >= 0);\n}\nfunction onHover(id) {\n  if (selected !== null) return;\n  hovered = id;\n  clearMarks();\n  if (id === null) { root.classList.remove('hovering'); return; }\n  root.classList.add('hovering');\n  const n = BRAIN.nodes[id];\n  nodeEls[id].classList.add('is-hover');\n  n.nb.forEach(j => nodeEls[j].classList.add('is-neighbor'));\n  litEdgesFor(id).forEach(i => edgeEls[i].classList.add('is-lit'));\n}\nfunction select(id) {\n  selected = id;\n  hovered = null;\n  root.classList.remove('hovering');\n  root.classList.add('has-selection');\n  clearMarks();\n  const n = BRAIN.nodes[id];\n  nodeEls[id].classList.add('is-selected');\n  n.nb.forEach(j => nodeEls[j].classList.add('is-neighbor'));\n  litEdgesFor(id).forEach(i => edgeEls[i].classList.add('is-lit'));\n  openPanel(n);\n}\nfunction deselect() {\n  selected = null;\n  root.classList.remove('has-selection');\n  clearMarks();\n  closePanel();\n}\n\nfunction openPanel(n) {\n  const side = n.side === 'L' ? 'Vänster hjärnhalva' : 'Höger hjärnhalva';\n  const code = (n.side === 'L' ? 'V' : 'H') + '-' + String(n.id).padStart(2, '0');\n  $('#p-code').textContent = code;\n  $('#p-region').textContent = 'Region ' + code;\n  $('#p-side').textContent = side;\n  $('#p-side').className = 'meta-pill ' + (n.side === 'L' ? 'left' : 'right');\n  $('#p-deg').textContent = n.deg;\n  $('#p-swatch').style.background = nodeEls[n.id].dataset.col;\n  const list = $('#p-links');\n  list.innerHTML = '';\n  [...n.nb].slice(0, 8).forEach(j => {\n    const m = BRAIN.nodes[j];\n    const mc = (m.side === 'L' ? 'V' : 'H') + '-' + String(m.id).padStart(2, '0');\n    const li = document.createElement('li');\n    li.innerHTML = `<span class=\"dot\" style=\"background:${nodeEls[j].dataset.col}\"><\u002Fspan>\n      <span class=\"lk-code\">${mc}<\u002Fspan>\n      <span class=\"lk-side\">${m.side === n.side ? 'samma halva' : 'korshalva'}<\u002Fspan>`;\n    li.addEventListener('click', () => select(j));\n    list.appendChild(li);\n  });\n  $('#panel').classList.add('open');\n}\nfunction closePanel() { $('#panel').classList.remove('open'); }\n\nfunction setTheme(name) {\n  if (!THEMES[name]) return;        // endast Salvia aktivt – övriga etiketter dekorativa\n  current = name;\n  document.querySelectorAll('.seg').forEach(b => b.classList.toggle('active', b.dataset.theme === name));\n  applyTheme();\n  if (selected !== null) $('#p-swatch').style.background = nodeEls[selected].dataset.col;\n}\n\nfunction init() {\n  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);\n  render();\n  svg.addEventListener('click', deselect);\n  $('#panel-close').addEventListener('click', e => { e.stopPropagation(); deselect(); });\n  document.querySelectorAll('.seg').forEach(b => b.addEventListener('click', () => setTheme(b.dataset.theme)));\n  document.addEventListener('keydown', e => { if (e.key === 'Escape') deselect(); });\n}\ninit();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
